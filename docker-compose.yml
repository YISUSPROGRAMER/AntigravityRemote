version: '3.8'

services:
  webtop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-remote-dev
    ports:
      - "3020:3000"   # Webtop HTTP Web Desktop interface (VNC)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - PASSWORD=${APP_PASSWORD}  # Uses the secure passcode for VNC Desktop login
    volumes:
      - webtop_config:/config
      - webtop_workspace:/workspace
    shm_size: "1gb"
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.desktop-auth.basicauth.users=jesus:$$apr1$$joRTATY8$$WEp5i7tX9.h2Hx0z/q3xd/"
      - "traefik.http.middlewares.desktop-auth.basicauth.removeheader=true"
      - "traefik.http.routers.compose-program-online-panel-lvda5z-17-websecure.middlewares=desktop-auth"

networks:
  default:
  dokploy-network:
    external: true

volumes:
  webtop_config:
    driver: local
  webtop_workspace:
    driver: local
