version: '3.8'

services:
  webtop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-remote-dev
    ports:
      - "3020:3000"   # Webtop HTTP Web Desktop interface (VNC)
      - "3120:3100"   # Antigravity Phone Connect server (Zero-Trust Frontend)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - PASSWORD=${APP_PASSWORD}  # Uses the same secure passcode for VNC Desktop login
    volumes:
      - webtop_config:/config
      - webtop_workspace:/workspace
    shm_size: "1gb"
    restart: unless-stopped
    networks:
      - default
      - dokploy-network

networks:
  default:
  dokploy-network:
    external: true

volumes:
  webtop_config:
    driver: local
  webtop_workspace:
    driver: local
